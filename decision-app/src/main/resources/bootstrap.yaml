server:
  port: 8080

spring:
  application:
    name: decision

  cloud:
    nacos:
      config:
        server-addr: 192.168.83.128:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yaml
      discovery:
        server-addr: 192.168.83.128:8848
        namespace: dev

  # 数据源（MySQL）
  datasource:
    url: jdbc:mysql://192.168.83.128:3306/decision?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

  # RabbitMQ
  rabbitmq:
    host: 192.168.83.128
    port: 5672
    username: root
    password: "1234"
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 3.0
          max-interval: 30000

  # Redis（Redisson starter 也读此配置作为兜底）
  data:
    redis:
      host: 192.168.83.128
      port: 6379
      database: 0

  # SQL 初始化（生产关闭，DDL 由 Flyway/Liquibase 管理）
  sql:
    init:
      mode: never

  # Spring AI DashScope（敏感值由 Nacos 下发，此处提供默认占位）
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-0f9206e250674c538ac03de6c3aa8b64}
      chat:
        options:
          model: glm-5
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
    # Milvus 现由 decision.rag.milvus.* 配置，不再使用 Spring AI 自动配置

  # 文件上传
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

# 业务配置
decision:
  agent:
    memory-window-size: 20
  rag:
    upload-dir: ${RAG_UPLOAD_DIR:./uploads/knowledge}
    max-file-size: ${RAG_MAX_FILE_SIZE:52428800}      # 50MB，上传层硬限制
    chunk-size: ${RAG_CHUNK_SIZE:512}                 # 每片最大 token 数
    chunk-overlap: ${RAG_CHUNK_OVERLAP:100}           # overlap token 数（约 20%）
    batch-size: ${RAG_BATCH_SIZE:100}                 # 批量写入 Milvus 的片数
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.7}  # 向量检索相似度下限
    milvus:
      uri: http://${MILVUS_HOST:192.168.83.128}:${MILVUS_PORT:19530}
      collection-name: knowledge_vectors
      dense-dimension: 1024                              # 须与 embedding model 输出维度一致
      rrf-k: 60                                          # RRF 融合参数，值越大长尾排名权重越高
  # MCP 数据库工具模块：为 Agent 提供安全受控的数据库访问
  mcp:
    enabled: true                                    # 模块总开关
    write-enabled: false                             # 写操作开关（INSERT/UPDATE/DELETE）
    query-timeout-seconds: 30                        # SQL 查询超时（秒）
    max-row-limit: 1000                              # 单次查询最大返回行数
    default-row-limit: 100                           # 未指定 limit 时的默认行数
    max-sql-length: 4096                             # SQL 最大长度（字符）
    table-whitelist: []                              # 静态白名单，也可通过 /api/mcp/whitelist 动态管理
    table-blacklist:                                 # 黑名单，始终禁止访问
      - mcp_audit_log
      - mcp_table_whitelist
    forbidden-keywords:                              # 禁止关键词，含这些词的 SQL 直接拒绝
      - TRUNCATE
      - DROP
      - ALTER
      - CREATE
      - GRANT
      - REVOKE
      - INTO OUTFILE
      - LOAD_FILE
      - SLEEP
      - BENCHMARK
  external:
    weather-url: http://api.weather.example.com/current
    logistics-url: http://api.logistics.example.com/track
    exchange-rate-url: http://api.exchange.example.com/rate

# 日志
logging:
  level:
    com.ye.decision: DEBUG
    org.springframework.ai: INFO
    com.baomidou.mybatisplus: INFO
