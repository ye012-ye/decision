server:
  port: 8080

spring:
  # 数据源（MySQL）
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/decision?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000


  application:
    name: decision
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yaml
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev

  # RabbitMQ
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3

  # Redis（Redisson starter 也读此配置作为兜底）
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  # SQL 初始化（生产关闭，DDL 由 Flyway/Liquibase 管理）
  sql:
    init:
      mode: never

  # Spring AI DashScope（敏感值由 Nacos 下发，此处提供默认占位）
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}

# Redisson 详细连接配置
redisson:
  single-server-config:
    address: redis://127.0.0.1:6379
    database: 0
    connection-minimum-idle-size: 5
    connection-pool-size: 20

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

# 业务配置
decision:
  agent:
    memory-window-size: 20
  external:
    weather-url: http://api.weather.example.com/current
    logistics-url: http://api.logistics.example.com/track
    exchange-rate-url: http://api.exchange.example.com/rate

# 日志
logging:
  level:
    com.ye.decision: DEBUG
    org.springframework.ai: INFO
    com.baomidou.mybatisplus: INFO

