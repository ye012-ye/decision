services:

  # ── MySQL 8 ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    networks:
      - decision-net
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: decision
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
#      - ./mysql/init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - decision-net
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ 3.13（含管理控制台）────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    networks:
      - decision-net
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: 1234
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理控制台
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Nacos 2.3（单机模式）─────────────────────────────────────────────────
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    restart: unless-stopped
    networks:
      - decision-net
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: 1234
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&serverTimezone=Asia%2FShanghai&allowPublicKeyRetrieval=true"
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"   # HTTP / 控制台
      - "9848:9848"   # gRPC（客户端）
      - "9849:9849"   # gRPC（集群）
    volumes:
      - nacos-logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --- Milvus 2.6.13 配置项 --------------------------------------------------
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
      container_name: milvus-minio
      image: minio/minio:RELEASE.2024-12-18T13-15-44Z
      environment:
        MINIO_ACCESS_KEY: minioadmin
        MINIO_SECRET_KEY: minioadmin
      ports:
        - "9001:9001"
        - "9000:9000"
      volumes:
        - minio-data:/minio_data
      command: minio server /minio_data --console-address ":9001"
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
        interval: 30s
        timeout: 20s
        retries: 3

  standalone:
      container_name: milvus-standalone
      image: milvusdb/milvus:v2.6.13
      command: [ "milvus", "run", "standalone" ]
      security_opt:
        - seccomp:unconfined
      environment:
        ETCD_ENDPOINTS: etcd:2379
        MINIO_ADDRESS: minio:9000
        MQ_TYPE: woodpecker
      volumes:
        - milvus-data:/var/lib/milvus
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
        interval: 30s
        start_period: 90s
        timeout: 20s
        retries: 3
      ports:
        - "19530:19530"
        - "9091:9091"
      depends_on:
        - "etcd"
        - "minio"

  # ── Attu（Milvus 可视化管理界面）────────────────────────────────────────
  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.6
    restart: unless-stopped
    environment:
      MILVUS_URL: standalone:19530
    ports:
      - "8002:3000"
    depends_on:
      standalone:
        condition: service_healthy



volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  nacos-logs:
  etcd-data:
  minio-data:
  milvus-data:

networks:
  decision-net:
    driver: bridge
